<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading MyScrape...</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0f172a; /* Tailwind slate-900 */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      color: white;
    }

    .splash-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(to right, #38bdf8, #818cf8); /* Tailwind sky-400 to indigo-400 */
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.025em;
    }

    p {
      margin: 0;
      color: #94a3b8; /* Tailwind slate-400 */
      font-size: 0.875rem;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(56, 189, 248, 0.2);
      border-radius: 50%;
      border-top-color: #38bdf8;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="loader"></div>
    <div>
      <h1>MyScrape</h1>
      <p>Initializing AI Models & Environment...</p>
    </div>
  </div>
</body>
</html>
